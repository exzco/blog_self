<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>wsh</title>
    <meta name="description" content="文章归档列表">
    <link rel="stylesheet" href="{{base_path}}style.css">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial,
                "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            zoom: 1.1;
        }
        .nav-link {
            position: relative;
            transition: color 0.15s;
        }
        .nav-link.active::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0; right: 0;
            height: 2px;
            background-color: #09090b;
            border-radius: 1px;
        }
        .article-row {
            display: flex;
            align-items: baseline;
            gap: 1.25rem;
            padding: 0.45rem 0;
            transition: background 0.1s;
        }
        .article-row:hover .article-title {
            color: #09090b;
            text-decoration: underline;
            text-underline-offset: 3px;
        }
        .article-date {
            font-size: 0.75rem;
            color: #a1a1aa;
            font-family: 'SFMono-Regular', Consolas, monospace;
            white-space: nowrap;
            min-width: 3rem;
        }
        .article-title {
            font-size: 0.875rem;
            color: #3f3f46;
            transition: color 0.15s;
        }
    </style>
</head>
<body class="bg-white text-zinc-950 min-h-screen">

    <!-- Top Nav -->
    <header class="w-full flex flex-col items-center pt-12 pb-6 px-4">
        <!-- Avatar placeholder -->
        <div class="w-20 h-20 rounded-full bg-zinc-100 border border-zinc-200 flex items-center justify-center mb-4 overflow-hidden">
            {{avatar}}
        </div>
        <!-- Blog Name -->
        <h1 class="text-base font-bold text-zinc-950 tracking-tight mb-5"></h1>
        <!-- Nav -->
        <nav class="flex items-center gap-6 text-sm">
            <a href="index.html" class="nav-link active font-medium text-zinc-950 text-sm pb-1">归档</a>
            <a href="about.html" class="nav-link text-zinc-500 hover:text-zinc-950 text-sm pb-1">关于</a>
        </nav>
        <div class="w-full max-w-xl border-b border-zinc-100 mt-6"></div>
    </header>

    <!-- Archive List -->
    <main class="max-w-xl mx-auto px-6 pb-20">
        {{archive_list}}
    </main>

</body>
</html>
